<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Coleta de Dados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }
        .container {
            width: 80%;
            margin: 0 auto;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 30px;
        }
        h2 {
            font-size: 1.8em;
            color: #2c3e50;
        }
        label {
            font-size: 1.1em;
            display: block;
            margin: 10px 0 5px;
        }
        input[type="text"], input[type="email"], input[type="tel"], input[type="checkbox"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.2em;
            border-radius: 5px;
        }
        button:hover {
            background-color: #34495e;
        }
        .note {
            font-size: 0.9em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>Formulário de Coleta de Dados Pessoais</h1>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>Dados Pessoais</h2>
            <p>Por favor, preencha os campos abaixo para coletarmos seus dados e melhorar a sua experiência conosco.</p>
            
            <form action="submit_data.php" method="POST">
                <!-- Nome completo -->
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">

                <!-- E-mail -->
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">

                <!-- Telefone -->
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone (opcional)">

                <!-- IP -->
                <label for="ip">Endereço IP (coletado automaticamente)</label>
                <input type="text" id="ip" name="ip" disabled value="Coletado automaticamente para fins de segurança e análise de performance">

                <!-- Cookies -->
                <label>
                    <input type="checkbox" name="cookies" id="cookies" checked disabled>
                    Aceito o uso de cookies para personalizar a experiência de navegação.
                </label>

                <!-- Dados de navegação -->
                <label>
                    <input type="checkbox" name="dados_navegacao" id="dados_navegacao" checked disabled>
                    Aceito que meus dados de navegação sejam coletados de forma anonimizada para análise do uso da plataforma.
                </label>

                <!-- Dados de login -->
                <label>
                    <input type="checkbox" name="dados_login" id="dados_login" checked disabled>
                    Aceito que meus dados de login sejam armazenados para autenticação e manutenção da sessão.
                </label>

                <!-- Consentimento -->
                <label>
                    <input type="checkbox" name="aceito" required>
                    Li e aceito a <a href="thais.1.html" target="_blank">Política de Privacidade</a>
                </label>

                <br><br>
                <button type="submit">Enviar</button>
            </form>

            <p class="note">* Todos os dados fornecidos serão utilizados conforme descrito na nossa Política de Privacidade.</p>
        </div>
    </div>

</body>
</html>
